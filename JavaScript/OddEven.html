<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd & Even</title>
</head>
<body>
    <h2>Check Browser Console Output</h2>
    <script>
        var number = 65;
        if(number % 2 == 0 ){
            console.log(number + "\nEVEN!");
        }
        else{
            console.log(number + "\nODD!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Conversion</title>
</head>
<body>
   <h2>Check Browser Console Output</h2>
   <script>
    var celsius = 38;
    var far = (celsius * 9/5)+32;
    console.log(celsius + "°C is equal to " + far + "°F");
   </script>
</body>
</html>
